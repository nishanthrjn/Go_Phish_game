<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Phish | Royale Edition</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="setup-screen" class="screen-overlay">
        <div class="casino-card">
            <h1 class="logo">♠ GO PHISH ♥</h1>
            <p class="tagline">The Royale Edition</p>
            
            <div class="input-group">
                <button class="gold-btn primary" onclick="startSolo()">SOLO VS AI</button>
                <div class="divider"><span>OR JOIN TABLE</span></div>
                <input type="text" id="username" placeholder="Dealer Name">
                <input type="text" id="room-id" placeholder="Table ID">
                <button class="gold-btn" onclick="joinGame()">JOIN ROOM</button>
            </div>
        </div>
    </div>

    <div id="waiting-screen" class="screen-overlay" style="display:none;">
        <div class="casino-card">
            <h2>TABLE ID: <span id="display-room"></span></h2>
            <p>Waiting for other players to join the felt...</p>
            <ul id="waiting-list-ul"></ul>
            <button id="start-btn" class="gold-btn" onclick="triggerStart()">DEAL CARDS</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="game-table">
            <div class="table-header">
                <div class="stat-box">DECK: <span id="deck-size">0</span></div>
                <div id="turn-indicator" class="turn-announcer">WAITING...</div>
                <div class="stat-box">BOOKS: <span id="p-books">0</span></div>
            </div>

            <div id="opponents-container" class="opponents-row"></div>

            <div class="table-center">
                <div class="status-msg-wrap">
                    <p id="status-msg">Welcome to the table.</p>
                </div>
                <div class="deck-visual"></div> </div>

            <div class="player-zone">
                <div id="player-area" class="fanned-hand"></div>
                
                <div class="action-bar">
                    <select id="target-player-select" class="rummy-select"></select>
                    <button id="ask-btn" class="ask-btn-royale" onclick="performAsk()" disabled>ASK PLAYER</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
