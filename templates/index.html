<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Phish 2.0 | Minimalist Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style_v2.css">
</head>
<body>

    <div class="game-wrapper">

        <div id="setup-screen" class="active-screen full-vh flex-center">
            <header class="logo-area">
                <h1 class="glitch-text" data-text="GO PHISH">GO PHISH</h1>
                <p class="subtitle">[Minimalist V2]</p>
            </header>
            
            <div class="menu-ui">
                <div class="solo-option">
                    <button class="btn-main" onclick="startSolo()"><span>SOLO VS AI</span></button>
                </div>
                
                <div class="divider">
                    <span class="line"></span>
                    <span class="text">or</span>
                    <span class="line"></span>
                </div>
                
                <div class="multi-option flex-col">
                    <input type="text" id="username" placeholder="> Enter Name">
                    <input type="text" id="room-id" placeholder="> Enter Room ID">
                    <button class="btn-sub" onclick="joinGame()">Join Family Room</button>
                </div>
            </div>
        </div>

        <div id="waiting-screen" class="full-vh flex-col flex-center" style="display:none;">
            <h2>ROOM ID: <span id="display-room" class="highlight-txt"></span></h2>
            <div class="waiting-area">
                <p>Waiting for opponents...</p>
                <ul id="waiting-list-ul"></ul>
                <button id="start-btn" class="btn-main mt-3" onclick="triggerStart()">START SESSION</button>
            </div>
        </div>

        <div id="game-screen" style="display:none;">
            
            <div class="top-HUD flex-justify">
                <div class="hud-item">
                    <span class="label">DECK</span>
                    <span id="deck-size" class="value">0</span>
                </div>
                <div class="hud-item">
                    <span class="label">BOOKS</span>
                    <span id="p-books" class="value">0</span>
                </div>
                <div id="turn-indicator" class="hud-turn-item">...</div>
            </div>

            <div class="playing-field">
                
                <aside id="opponents-sidebar">
                    <div class="section-label">OPPONENTS</div>
                    <div id="opponents-container"></div>
                </aside>
                
                <main class="center-play">
                    <div class="status-bubble-v2">
                        <p id="status-msg">> Ready...</p>
                    </div>

                    <div class="player-hand-wrapper">
                        <div id="player-area" class="hand-v2"></div>
                    </div>

                    <div class="controls-v2 flex-center gap-1">
                        <select id="target-player-select" class="d-none"></select>
                        <button id="ask-btn" class="btn-main" onclick="performAsk()" disabled><span>ASK</span></button>
                    </div>
                </main>

            </div> </div> </div> <script src="/static/js/game.js"></script>
</body>
</html>
